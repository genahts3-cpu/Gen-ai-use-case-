<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Code Gen Agent</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0d1117;
      color: #e6edf3;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── HEADER ── */
    header {
      background: #161b22;
      border-bottom: 1px solid #30363d;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .header-left { display: flex; align-items: center; gap: 10px; }
    .header-left .logo { font-size: 24px; }
    .header-left h1 { font-size: 17px; font-weight: 700; color: #58a6ff; }
    .header-left p  { font-size: 12px; color: #8b949e; }

    .settings-btn {
      background: none;
      border: 1px solid #30363d;
      color: #8b949e;
      padding: 6px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
    }
    .settings-btn:hover { border-color: #58a6ff; color: #58a6ff; }

    /* ── SETTINGS DRAWER ── */
    .settings-drawer {
      background: #161b22;
      border-bottom: 1px solid #30363d;
      padding: 0 24px;
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease, padding 0.3s ease;
      flex-shrink: 0;
    }
    .settings-drawer.open {
      max-height: 200px;
      padding: 16px 24px;
    }
    .settings-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }
    .settings-grid label {
      font-size: 11px;
      font-weight: 600;
      color: #8b949e;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      display: block;
      margin-bottom: 5px;
    }
    .settings-grid input {
      width: 100%;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 6px;
      color: #e6edf3;
      font-size: 13px;
      padding: 8px 10px;
      outline: none;
    }
    .settings-grid input:focus { border-color: #58a6ff; }

    /* ── CHAT AREA ── */
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .msg { display: flex; gap: 12px; max-width: 860px; width: 100%; }
    .msg.user { align-self: flex-end; flex-direction: row-reverse; }
    .msg.agent { align-self: flex-start; }

    .avatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }
    .msg.user  .avatar { background: #1f6feb; }
    .msg.agent .avatar { background: #238636; }

    .bubble {
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.6;
      max-width: 780px;
    }
    .msg.user  .bubble {
      background: #1f6feb22;
      border: 1px solid #1f6feb55;
      color: #cdd9e5;
    }
    .msg.agent .bubble {
      background: #161b22;
      border: 1px solid #30363d;
      font-family: 'Cascadia Code', 'Consolas', monospace;
      font-size: 13px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    /* log line colors inside agent bubble */
    .ll-success { color: #3fb950; display: block; }
    .ll-error   { color: #f85149; display: block; }
    .ll-info    { color: #58a6ff; display: block; }
    .ll-warn    { color: #d29922; display: block; }
    .ll-dim     { color: #8b949e; display: block; }
    .ll-normal  { color: #e6edf3; display: block; }

    .typing-dot {
      display: inline-block;
      width: 6px; height: 6px;
      background: #3fb950;
      border-radius: 50%;
      animation: blink 1s infinite;
      margin-left: 4px;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

    /* ── INPUT BAR ── */
    .input-bar {
      background: #161b22;
      border-top: 1px solid #30363d;
      padding: 16px 24px;
      display: flex;
      gap: 10px;
      align-items: flex-end;
      flex-shrink: 0;
    }

    .api-key-wrap {
      display: flex;
      flex-direction: column;
      gap: 4px;
      flex-shrink: 0;
    }
    .api-key-wrap span {
      font-size: 10px;
      color: #8b949e;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .api-key-wrap input {
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 8px;
      color: #e6edf3;
      font-size: 13px;
      padding: 10px 12px;
      outline: none;
      width: 200px;
    }
    .api-key-wrap input:focus { border-color: #58a6ff; }

    .prompt-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .prompt-wrap span {
      font-size: 10px;
      color: #8b949e;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    #prompt-input {
      width: 100%;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 8px;
      color: #e6edf3;
      font-size: 14px;
      padding: 10px 14px;
      outline: none;
      resize: none;
      font-family: inherit;
      min-height: 44px;
      max-height: 140px;
      overflow-y: auto;
      line-height: 1.5;
    }
    #prompt-input:focus { border-color: #58a6ff; }
    #prompt-input::placeholder { color: #484f58; }

    .send-btn {
      background: #238636;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 10px 20px;
      font-size: 20px;
      cursor: pointer;
      flex-shrink: 0;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }
    .send-btn:hover:not(:disabled) { background: #2ea043; }
    .send-btn:disabled { background: #21262d; cursor: not-allowed; }

    .stop-btn {
      background: #da3633;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 10px 16px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      flex-shrink: 0;
      height: 44px;
      display: none;
    }
    .stop-btn.visible { display: flex; align-items: center; }
    .stop-btn:hover { background: #f85149; }

    /* welcome screen */
    .welcome {
      margin: auto;
      text-align: center;
      color: #484f58;
    }
    .welcome .icon { font-size: 56px; margin-bottom: 16px; }
    .welcome h2 { font-size: 20px; color: #8b949e; margin-bottom: 8px; }
    .welcome p  { font-size: 14px; }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }
  </style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="header-left">
    <div class="logo">🤖</div>
    <div>
      <h1>Code Generation Agent</h1>
      <p>Chat to generate complete applications</p>
    </div>
  </div>
  <button class="settings-btn" onclick="toggleSettings()">⚙️ Settings</button>
</header>

<!-- SETTINGS DRAWER -->
<div class="settings-drawer" id="settings-drawer">
  <div class="settings-grid">
    <div>
      <label>Base URL</label>
      <input type="text" id="base-url" value="https://genailab.tcs.in/v1" />
    </div>
    <div>
      <label>Model</label>
      <input type="text" id="model" value="genailab-maas-gpt-5.2-codex" />
    </div>
    <div>
      <label>Output Workspace</label>
      <input type="text" id="workspace" value="C:\Users\GenAICHNKPRUSR04\Documents\CodeAgent\generated" />
    </div>
  </div>
</div>

<!-- CHAT -->
<div id="chat">
  <div class="welcome" id="welcome">
    <div class="icon">💬</div>
    <h2>What do you want to build?</h2>
    <p>Type your app idea below and the agent will generate the full codebase.</p>
  </div>
</div>

<!-- INPUT BAR -->
<div class="input-bar">
  <div class="api-key-wrap">
    <span>API Key</span>
    <input type="password" id="api-key" placeholder="sk-..." />
  </div>

  <div class="prompt-wrap">
    <span>Your prompt (Enter to send, Shift+Enter for new line)</span>
    <textarea id="prompt-input" rows="1" placeholder="e.g. Build a FastAPI todo app with SQLite and a clean HTML frontend..."></textarea>
  </div>

  <button class="send-btn" id="send-btn" onclick="sendMessage()" title="Send">➤</button>
  <button class="stop-btn" id="stop-btn" onclick="stopAgent()">⏹ Stop</button>
</div>

<script>
  let abortController = null;

  function toggleSettings() {
    document.getElementById('settings-drawer').classList.toggle('open');
  }

  // Auto-resize textarea
  const promptInput = document.getElementById('prompt-input');
  promptInput.addEventListener('input', () => {
    promptInput.style.height = 'auto';
    promptInput.style.height = Math.min(promptInput.scrollHeight, 140) + 'px';
  });
  promptInput.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  function addUserMessage(text) {
    document.getElementById('welcome')?.remove();
    const chat = document.getElementById('chat');
    const msg = document.createElement('div');
    msg.className = 'msg user';
    msg.innerHTML = `
      <div class="avatar">👤</div>
      <div class="bubble">${escapeHtml(text)}</div>`;
    chat.appendChild(msg);
    chat.scrollTop = chat.scrollHeight;
  }

  function addAgentBubble() {
    document.getElementById('welcome')?.remove();
    const chat = document.getElementById('chat');
    const msg = document.createElement('div');
    msg.className = 'msg agent';
    msg.innerHTML = `
      <div class="avatar">🤖</div>
      <div class="bubble" id="agent-bubble"><span class="typing-dot"></span></div>`;
    chat.appendChild(msg);
    chat.scrollTop = chat.scrollHeight;
    return document.getElementById('agent-bubble');
  }

  function appendToAgentBubble(bubble, text) {
    // Remove typing dot on first real content
    const dot = bubble.querySelector('.typing-dot');
    if (dot) dot.remove();

    text.split('\n').forEach(line => {
      if (!line.trim()) return;
      const span = document.createElement('span');

      if      (line.startsWith('✅'))                          span.className = 'll-success';
      else if (line.startsWith('❌'))                          span.className = 'll-error';
      else if (line.startsWith('🎉') || line.startsWith('🚀')) span.className = 'll-info';
      else if (line.startsWith('⚠️'))                         span.className = 'll-warn';
      else if (line.startsWith('  ') || line.startsWith('$')) span.className = 'll-dim';
      else                                                     span.className = 'll-normal';

      span.textContent = line;
      bubble.appendChild(span);
    });

    const chat = document.getElementById('chat');
    chat.scrollTop = chat.scrollHeight;
  }

  function escapeHtml(t) {
    return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  async function sendMessage() {
    const prompt    = promptInput.value.trim();
    const apiKey    = document.getElementById('api-key').value.trim();
    const baseUrl   = document.getElementById('base-url').value.trim();
    const model     = document.getElementById('model').value.trim();
    const workspace = document.getElementById('workspace').value.trim();

    if (!prompt) return;
    if (!apiKey) { alert('Please enter your API key.'); return; }

    // Clear input
    promptInput.value = '';
    promptInput.style.height = 'auto';

    addUserMessage(prompt);
    const bubble = addAgentBubble();

    document.getElementById('send-btn').disabled = true;
    document.getElementById('stop-btn').classList.add('visible');

    abortController = new AbortController();

    try {
      const res = await fetch('/api/agent/run', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ api_key: apiKey, user_prompt: prompt, base_url: baseUrl, model, workspace }),
        signal: abortController.signal,
      });

      if (!res.ok) {
        appendToAgentBubble(bubble, '❌ Server error: ' + await res.text());
        return;
      }

      const reader  = res.body.getReader();
      const decoder = new TextDecoder();

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        decoder.decode(value).split('\n').forEach(line => {
          if (!line.startsWith('data: ')) return;
          const msg = line.slice(6);
          if (msg === '__DONE__' || !msg.trim()) return;
          appendToAgentBubble(bubble, msg);
        });
      }

    } catch (e) {
      if (e.name === 'AbortError') {
        appendToAgentBubble(bubble, '⏹ Stopped by user.');
      } else {
        appendToAgentBubble(bubble, '❌ ' + e.message);
      }
    } finally {
      document.getElementById('send-btn').disabled = false;
      document.getElementById('stop-btn').classList.remove('visible');
      abortController = null;
    }
  }

  function stopAgent() {
    if (abortController) abortController.abort();
  }
</script>

</body>
</html>
